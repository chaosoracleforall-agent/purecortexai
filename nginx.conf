events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    upstream oauth2_proxy {
        server oauth2-proxy:4180;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Hide server version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1000;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name purecortex.ai www.purecortex.ai;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name purecortex.ai www.purecortex.ai;

        ssl_certificate /etc/letsencrypt/live/purecortex.ai-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/purecortex.ai-0001/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/purecortex.ai-0001/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 10s;

        # TLS session reuse
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Request size limits
        client_max_body_size 1m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://purecortex.ai https://purecortex.ai; font-src 'self' https://fonts.gstatic.com;" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Legacy doc URL redirects
        location = /docs/API.md { return 301 /docs/api; }
        location = /docs/MCP.md { return 301 /docs/mcp; }
        location = /docs/CLI.md { return 301 /docs/cli; }
        location = /TERMS.md { return 301 /docs/terms; }
        location = /PRIVACY.md { return 301 /docs/privacy; }

        location @oauth2_sign_in {
            return 302 /oauth2/start?rd=$scheme://$host$request_uri;
        }

        location = /oauth2/auth {
            internal;
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location /oauth2/ {
            proxy_pass http://oauth2_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
        }

        location ^~ /admin-api/ {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_sign_in;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL $auth_email;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location ^~ /admin {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_sign_in;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL $auth_email;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API routes → backend (rate limited)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL "";
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # WebSocket routes → backend (rate + conn limited)
        location /ws/ {
            limit_req zone=ws burst=5 nodelay;
            limit_conn ws_conn 10;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL "";
            proxy_buffering off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 10s;
        }

        location /health {
            proxy_pass http://backend;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL "";
        }

        # Everything else → frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-PURECORTEX-AUTH-EMAIL "";
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
