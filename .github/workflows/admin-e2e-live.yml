name: Admin E2E Live

on:
  workflow_dispatch:
    inputs:
      admin_e2e_auth_mode:
        description: 'Auth mode for the live admin browser smoke'
        required: false
        default: dev-session
        type: choice
        options:
          - dev-session
          - header

jobs:
  admin-e2e-live:
    name: Live Admin E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: purecortex
          POSTGRES_USER: purecortex
          POSTGRES_PASSWORD: purecortex-local-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U purecortex -d purecortex"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        working-directory: backend
        env:
          PURECORTEX_DATABASE_URL: postgresql://purecortex:purecortex-local-dev@127.0.0.1:5432/purecortex
        run: python -m alembic upgrade head

      - name: Start backend
        working-directory: backend
        env:
          PURECORTEX_DATABASE_URL: postgresql://purecortex:purecortex-local-dev@127.0.0.1:5432/purecortex
          PURECORTEX_INTERNAL_ADMIN_TOKEN: ci-local-admin-token
          PURECORTEX_KEY_HMAC_SECRET: ci-local-hmac-secret
          PURECORTEX_BOOTSTRAP_TOKEN: ci-local-bootstrap-token
          PURECORTEX_ADMIN_SECRET: ci-local-admin-secret
          PURECORTEX_ADMIN_ALLOWED_EMAILS: chaosoracleforall@gmail.com
          REDIS_URL: redis://127.0.0.1:6379/15
          ENABLE_AGENTS: '0'
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/purecortex-backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)

          raise SystemExit("Backend failed to become healthy in time.")
          PY

      - name: Run mocked and live admin smoke
        working-directory: frontend
        env:
          PURECORTEX_INTERNAL_BACKEND_URL: http://127.0.0.1:8000
          PURECORTEX_INTERNAL_ADMIN_TOKEN: ci-local-admin-token
          PURECORTEX_ADMIN_ALLOWED_EMAILS: chaosoracleforall@gmail.com
          PURECORTEX_RUN_LIVE_ADMIN_E2E: '1'
          PURECORTEX_E2E_BACKEND_URL: http://127.0.0.1:8000
          PURECORTEX_ADMIN_E2E_AUTH_MODE: ${{ inputs.admin_e2e_auth_mode }}
          PURECORTEX_ADMIN_E2E_EMAIL: chaosoracleforall@gmail.com
        run: npm run test:e2e:admin:smoke

      - name: Print backend log on failure
        if: failure()
        run: |
          echo "=== /tmp/purecortex-backend.log ==="
          sed -n '1,240p' /tmp/purecortex-backend.log
