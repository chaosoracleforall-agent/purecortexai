name: Admin E2E Mocked

on:
  push:
    paths:
      - '.github/workflows/admin-e2e-mocked.yml'
      - '.github/workflows/admin-e2e-live.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/run_admin_e2e_smoke.sh'
      - 'CHANGELOG.md'
  pull_request:
    paths:
      - '.github/workflows/admin-e2e-mocked.yml'
      - '.github/workflows/admin-e2e-live.yml'
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/run_admin_e2e_smoke.sh'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  admin-e2e-mocked:
    name: Mocked Admin E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run mocked admin smoke
        run: npm run test:e2e:admin:smoke
