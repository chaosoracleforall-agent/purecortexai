    <circle cx="0" cy="0" r="28" stroke="#007AFF" stroke-width="3" fill="none"/>
    <path d="M-14 0 Q0 -28 14 0 T42 0" stroke="#007AFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3.5" fill="#007AFF"/>
