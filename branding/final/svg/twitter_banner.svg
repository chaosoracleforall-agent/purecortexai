<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1500" height="500" fill="#050505"/>

  <!-- Subtle glow behind icon -->
  <circle cx="480" cy="250" r="120" fill="#007AFF" opacity="0.04"/>
  <circle cx="480" cy="250" r="80" fill="#007AFF" opacity="0.06"/>

  <!-- Atomic Neuron Icon -->
  <g transform="translate(480, 250)">
